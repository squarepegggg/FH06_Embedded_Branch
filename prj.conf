# C++ global constructors (required for Edge Impulse / TFLite)
CONFIG_STATIC_INIT_GNU=y

# SPI and GPIO
CONFIG_GPIO=y
CONFIG_SPI=y

# Serial driver (needed by console subsystem); route output to RTT not UART
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n

# Logging via RTT
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_IMMEDIATE=n
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096

# Power management
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y

# BLE (GATT peripheral for web dashboard)
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="AccelDevice"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_GATT_CLIENT=n
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=y
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# Larger BLE buffers to avoid "Event buffer too small" / -12 / kernel panic
# RX buffer must fit max HCI event (2 + 255 = 257). Use ACL size >= 257 so BT_BUF_RX_SIZE >= 257.
CONFIG_BT_BUF_EVT_RX_SIZE=255
CONFIG_BT_BUF_ACL_RX_SIZE=257
CONFIG_BT_BUF_ACL_TX_SIZE=256
CONFIG_BT_BUF_EVT_RX_COUNT=12
CONFIG_BT_BUF_CMD_TX_COUNT=10
CONFIG_BT_L2CAP_TX_MTU=252

# FPU for ML inference
CONFIG_FPU=y

# Stack
CONFIG_MAIN_STACK_SIZE=4096

# Disable MPU stack guard (nRF52832 has only 8 MPU regions)
CONFIG_HW_STACK_PROTECTION=n

# ADC (enabled for solar PCB overlay)
CONFIG_ADC=y
