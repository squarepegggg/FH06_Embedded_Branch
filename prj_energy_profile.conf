# Enable logging so ENERGY_PROFILE summary lines appear on RTT when running ./jlink.sh
# Build with: west build -b nrf52dk/nrf52832 -d build -- -DEXTRA_CONF_FILE=prj_energy_profile.conf
# Or from project root: ./build.sh then reconfigure with -DEXTRA_CONF_FILE=prj_energy_profile.conf
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
